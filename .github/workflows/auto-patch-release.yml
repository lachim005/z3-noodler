name: Auto Patch Release

on:
  push:
    branches:
      - devel

permissions:
  contents: write
  pull-requests: read

jobs:
  tag-and-release:
    name: Tag + GitHub Release (patch)
    runs-on: ubuntu-latest
    if: github.repository_owner == 'VeriFIT'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find merged PR for this commit
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          repo="${{ github.event.repository.name }}"
          sha="${{ github.sha }}"

          # Defensive: this workflow is branch-triggered, but make sure we never run on tag refs.
          case "${{ github.ref }}" in
            refs/tags/*)
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          # Returns PRs associated with this commit (typically 0 or 1 for merge commits).
          prs_json=$(gh api "/repos/${owner}/${repo}/commits/${sha}/pulls" -H "Accept: application/vnd.github+json")
          pr_number=$(printf "%s" "$prs_json" | python3 -c 'import json,sys; prs=json.load(sys.stdin); print(prs[0]["number"] if prs else "")')

          if [ -z "$pr_number" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Check label release:patch
        id: gate
        if: steps.pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          repo="${{ github.event.repository.name }}"
          pr_number="${{ steps.pr.outputs.number }}"

          pr=$(gh api "/repos/${owner}/${repo}/pulls/${pr_number}" -H "Accept: application/vnd.github+json")
          has_label=$(printf "%s" "$pr" | python3 -c 'import json,sys; pr=json.load(sys.stdin); print("true" if any(l.get("name")=="release:patch" for l in pr.get("labels",[])) else "false")')

          echo "release_patch=$has_label" >> "$GITHUB_OUTPUT"

      - name: Stop (no release requested)
        if: steps.pr.outputs.found != 'true' || steps.gate.outputs.release_patch != 'true'
        run: |
          echo "No PR with label release:patch found; skipping."

      - name: Compute next patch tag
        id: ver
        if: steps.gate.outputs.release_patch == 'true'
        run: |
          set -euo pipefail
          next_tag=$(python3 scripts/ci/bump_patch_and_tag.py)
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.gate.outputs.release_patch == 'true'
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists; exiting."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Auto patch release $tag"
          git push origin "$tag"

      - name: Create GitHub Release (metadata only)
        if: steps.gate.outputs.release_patch == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
