name: Z3-Noodler Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to publish a GitHub Release for (used by auto-patch-release)'
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish-binaries:
    # Avoid duplicate builds for patch releases:
    # `auto-patch-release.yml` creates a tag and calls this workflow via `workflow_call`.
    # The tag push is performed by `github-actions[bot]` and would also trigger this workflow via `on: push: tags`.
    # We skip the bot-created tag-push run and keep:
    # - manual tag pushes (actor != github-actions[bot])
    # - workflow_call invocations (event_name == workflow_call)
    if: ${{ github.event_name == 'workflow_call' || github.actor != 'github-actions[bot]' }}
    name: Build binary (${{ matrix.os }}-${{ matrix.os_version }} / ${{ matrix.arch }} / ${{ matrix.variant }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            os_version: 24.04
            arch: x86_64
            variant: shared
            runner: ubuntu-24.04
          - os: ubuntu
            os_version: 20.04
            arch: x86_64
            variant: shared
            runner: ubuntu-20.04
          - os: ubuntu
            os_version: 24.04
            arch: x86_64
            variant: static-libz3
            runner: ubuntu-24.04
          - os: macos
            os_version: 15-intel
            arch: x86_64
            variant: shared
            runner: macos-15-intel
          - os: macos
            os_version: 15
            arch: arm64
            variant: shared
            runner: macos-latest

    steps:
      - name: Checkout Z3-Noodler
        uses: actions/checkout@v6
        with: 
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        run: brew update && brew install cmake

      - name: Configure & Build Z3-Noodler (Unix, shared)
        if: matrix.variant == 'shared'
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc || sysctl -n hw.ncpu)

      - name: Configure & Build Z3-Noodler (Unix, static libz3)
        if: matrix.variant == 'static-libz3'
        run: |
          mkdir build && cd build
          cmake -DZ3_BUILD_LIBZ3_SHARED=OFF -DZ3_BUILD_EXECUTABLE=ON -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc || sysctl -n hw.ncpu)

      - name: Package binary (Unix)
        run: |
          mv build/z3 build/z3-noodler-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.arch }}-${{ matrix.variant }}
          chmod +x build/z3-noodler-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.arch }}-${{ matrix.variant }}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: z3-noodler-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.arch }}-${{ matrix.variant }}
          path: build/z3-noodler-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.arch }}-${{ matrix.variant }}*


  release:
    # Same guard as in build job: prevent a second, bot-triggered publish.
    if: ${{ github.event_name == 'workflow_call' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    needs: build-and-publish-binaries
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # downloads all binaries to artifacts/ instead of putting each one in artifacts/<name>/

      - name: Restore executable permissions
        run: chmod +x artifacts/z3-noodler-*
  
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/z3-noodler-*
          generate_release_notes: true
