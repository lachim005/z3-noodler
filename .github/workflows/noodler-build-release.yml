name: Z3-Noodler Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish-binaries:
    name: Build binary (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            arch: x86_64
            runner: ubuntu-latest
          - os: macos
            arch: x86_64
            runner: macos-15-intel
          - os: macos
            arch: arm64
            runner: macos-latest

    steps:
      - name: Checkout Z3-Noodler
        uses: actions/checkout@v6
        with: 
          ref: ${{ github.head_ref }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        run: brew update && brew install cmake

      - name: Configure & Build Z3-Noodler
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc || sysctl -n hw.ncpu)
        
      - run: mv build/z3 build/z3-noodler-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: z3-noodler-${{ matrix.os }}-${{ matrix.arch }}
          path: build/z3-noodler-${{ matrix.os }}-${{ matrix.arch }}


  release:
    runs-on: ubuntu-latest
    needs: build-and-publish-binaries
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # downloads all binaries to artifacts/ instead of putting each one in artifacts/<name>/
      - name: Restore executable permissions
        run: chmod +x dist/z3-noodler-*
  
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/z3-noodler-*
          generate_release_notes: true
